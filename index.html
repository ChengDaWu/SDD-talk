<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="3 月 31 日 SDD 規格驅動開發講演預告"
    />
    <title>春漾 SDD｜3 月 31 日講演預告</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">03 / 31 · SDD 規格驅動開發預告</p>
        <h1>春漾 SDD</h1>
        <p class="subtitle"></p>
      </header>

      <section class="poster-section" aria-labelledby="poster-title">
        <div class="section-head">
          <h2 id="poster-title"></h2>
          <p></p>
        </div>
        <figure class="poster-card">
          <img
            src="assets/sdd-poster.jpg"
            alt="春漾 SDD "
            loading="lazy"
          />
          <figcaption></figcaption>
        </figure>
      </section>

      <section class="video-section" aria-labelledby="video-title">
        <div class="section-head">
          <h2 id="video-title">簡介</h2>
          <p></p>
        </div>
        <div class="video-wrapper">
          <iframe
            src="https://www.youtube.com/embed/tnsdFy0BB98"
            title="SDD 簡介影片"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </section>

      <section class="copy-section" aria-labelledby="copy-title">
        <div class="section-head">
          <h2 id="copy-title">預告文字</h2>
        </div>
        <div class="copy-grid">
          <blockquote>
            別怪 AI 會亂猜<br />
            人類腦補 更厲害<br />
            prompt 像 code 這樣寫<br />
            version、驗收 都要在
          </blockquote>
          <blockquote>
            AI 寫得 比我快<br />
            當然讓它 先寫來<br />
            但 review、test、驗收<br />
            一個都不能 放開
          </blockquote>
          <blockquote>
            Vibe vibe vibe — 可以快<br />
            可控不能 被掩蓋<br />
            速度從來 不稀缺<br />
            稀缺是 正確留下來
          </blockquote>
          <blockquote>
            SDD SDD — 不呆<br />
            是把意圖 寫下來<br />
            把對話 變流程<br />
            把未來 變成可維護的安排
          </blockquote>
        </div>
      </section>

      <footer class="footer">
        <p>📍 3 月 31 日。讓未來，從現在開始被安排。</p>
      </footer>
    </main>
  </body>
</html>
